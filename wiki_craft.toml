# Wiki Craft configuration.
# Enable at least one source before running `cargo run -- ingest --once`.
# LLM environment variables follow scribe_engine:
# LLM_API_KEY, LLM_BASE_URL, LLM_MODEL.

[[sources]]
name = "example"
url = "https://mp.weixin.qq.com/s/uTPxCmrG0S72Np8EQcmLyA"
enabled = true
timeout_seconds = 15
max_bytes = 200000

[schedule]
interval_minutes = 60

[llm]
base_url = "https://api.deepseek.com"
model = "deepseek-v4-flash"
max_tokens = 4096

[audit]
enabled = true
path = ".wiki_craft/audit/events.jsonl"

[runtime]
root = ".wiki_craft"
max_steps = 8

[context_compact]
enabled = true
auto_token_threshold = 50000
auto_preserve_recent_messages = 4
transcript_dir = ".wiki_craft/transcripts"

[prompt_cache]
enabled = true
dir = ".wiki_craft/prompt_cache"

[metrics]
enabled = true
dir = ".wiki_craft/metrics"
http_bind = "127.0.0.1:9898"
