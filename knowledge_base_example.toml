name = "Example Knowledge Base"
focus = "Describe the durable topic, audience, and retrieval goal for this knowledge base."

[ingest.once]

[[ingest.once.sources]]
url = "https://example.com/source.html"
enabled = true
timeout_seconds = 15
max_bytes = 200000

[ingest.cron]

[[ingest.cron.sources]]
url = "https://example.com/source.html"
enabled = false
interval_hours = 24
timeout_seconds = 15
max_bytes = 200000
